       name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract zip
        run: unzip ketofit-complete.zip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend deps
        run: |
          cd ketofit/frontend
          npm install

      - name: Set API URL
        run: |
          sed -i 's|YOUR_SERVER_IP|${{ secrets.KETOFIT }}|g' ketofit/frontend/src/App.jsx

      - name: Build React
        run: |
          cd ketofit/frontend
          CI=false npm run build

      - name: Capacitor setup
        run: |
          cd ketofit/frontend
          rm -f capacitor.config.ts
          npx cap init "ketofit" "app.ketofit.ir" --web-dir build
          npx cap add android
          npx cap sync android

      - name: Allow HTTP
        run: |
          mkdir -p ketofit/frontend/android/app/src/main/res/xml
          cat > ketofit/frontend/android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system"/>
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF
          sed -i 's/android:label="ketofit"/android:label="ketofit" android:networkSecurityConfig="@xml\/network_security_config"/' ketofit/frontend/android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd ketofit/frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ketofit-apk
          path: ketofit/frontend/android/appoutputsoutputs/apk/debug/app-debug.apk
